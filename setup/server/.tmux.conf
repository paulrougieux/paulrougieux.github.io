# tmux config for a remote server, reached over ssh from a laptop running
# GNOME Terminal (sometimes with a local tmux wrapping the ssh session).
#
# Same as ~/rp/paulrougieux.github.io/setup/.tmux.conf, except the copy
# binding no longer pipes through xclip. xclip talks to an X server, and on
# a remote host there is no X server reachable from the laptop, so anything
# copied that way never leaves the server. Instead this config relies on
# OSC 52, a terminal escape sequence that tmux sends through the ssh
# connection to whichever terminal is actually rendering the session, which
# is what lets the laptop's clipboard get updated from a remote tmux.
#
# Deploy to the server (user paul) with rsync, so it lives at ~/.tmux.conf:
#   rsync -av ~/rp/paulrougieux.github.io/setup/server/.tmux.conf paul@flower:~/.tmux.conf
#
# If you also run tmux locally on the laptop and ssh out from inside it
# (nested tmux), add this line to the *local* ~/.tmux.conf as well, so the
# outer tmux forwards the OSC 52 sequence instead of swallowing it:
#   set -g allow-passthrough on

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# https://thoughtbot.com/blog/love-hate-tmux
# remove administrative debris (session name, hostname, time) in status bar
set -g status-left ''
set -g status-right ''

# Conf copied from
# https://gist.github.com/spicycode/1229612
# Automatically set window title
set-window-option -g automatic-rename on
set-option -g set-titles on

set -g status-keys vi
set -g history-limit 10000

setw -g mode-keys vi
setw -g monitor-activity on

bind-key v split-window -h
# Small split for compilation of markdown, quarto or latex documents
bind-key s split-window -v \; resize-pane -y 3
# Larger split for ipython
bind-key i split-window -v \; resize-pane -y 18

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5

bind-key M-j resize-pane -D
bind-key M-k resize-pane -U
bind-key M-h resize-pane -L
bind-key M-l resize-pane -R

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window

# No delay for escape key press
set -sg escape-time 0

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Copy paste in tmux, adapted for a remote session:
# https://www.rushiagr.com/blog/2016/06/16/everything-you-need-to-know-about-tmux-copy-pasting-ubuntu/
# Let tmux relay the selection to the client terminal via OSC 52 instead of
# a local clipboard tool, so it reaches the laptop's clipboard over ssh.
set -g set-clipboard on
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# map copy mode to ctrl+alt+c
bind-key -n 'C-M-c' copy-mode
# map paste buffer to ctrl+alt+v
bind-key -n 'C-M-v' paste-buffer

# Reload this config with:
#   tmux source-file ~/.tmux.conf
